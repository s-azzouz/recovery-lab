  <!-- ===================== MOBILE FRAME ===================== -->
  <g transform="translate(1520,0)">
    <rect x="0" y="0" width="390" height="844" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="24"/>

    <!-- Header -->
    <rect x="0" y="0" width="390" height="64" fill="#163A5F"/>
    <text x="20" y="38" font-size="16" font-weight="bold" fill="#FFFFFF">RecoveryLab</text>
    <g fill="#FFFFFF">
      <rect x="345" y="26" width="20" height="2.5"/>
      <rect x="345" y="32" width="20" height="2.5"/>
      <rect x="345" y="38" width="20" height="2.5"/>
    </g>

    <!-- Hero -->
    <rect x="0" y="64" width="390" height="220" fill="#F5F5F5"/>
    <text x="20" y="120" font-size="22" font-weight="bold" fill="#163A5F">Recover Stronger.</text>
    <text x="20" y="146" font-size="22" font-weight="bold" fill="#163A5F">Return Safer.</text>
    <text x="20" y="176" font-size="12" fill="#333333">Personalised recovery plans built</text>
    <text x="20" y="192" font-size="12" fill="#333333">around your injury and goals.</text>
    <rect x="20" y="214" width="190" height="44" rx="8" fill="#F97316"/>
    <text x="115" y="241" font-size="13" fill="#FFFFFF" text-anchor="middle">Start Your Assessment</text>

    <!-- Feature cards (stacked) -->
    <text x="20" y="310" font-size="16" font-weight="bold" fill="#163A5F">How RecoveryLab Helps</text>

    <g>
      <rect x="20" y="330" width="350" height="120" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
      <rect x="40" y="350" width="36" height="36" rx="6" fill="#2E8B57"/>
      <text x="40" y="408" font-size="14" font-weight="bold" fill="#163A5F">Recovery Assessment</text>
      <text x="40" y="428" font-size="11" fill="#333333">A short questionnaire matched to you.</text>
    </g>

    <g>
      <rect x="20" y="464" width="350" height="120" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
      <rect x="40" y="484" width="36" height="36" rx="6" fill="#2E8B57"/>
      <text x="40" y="542" font-size="14" font-weight="bold" fill="#163A5F">Injury Library</text>
      <text x="40" y="562" font-size="11" fill="#333333">Understand your injury at a glance.</text>
    </g>

    <g>
      <rect x="20" y="598" width="350" height="120" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
      <rect x="40" y="618" width="36" height="36" rx="6" fill="#2E8B57"/>
      <text x="40" y="676" font-size="14" font-weight="bold" fill="#163A5F">Exercise Library</text>
      <text x="40" y="696" font-size="11" fill="#333333">Guided moves for every recovery stage.</text>
    </g>

    <!-- Testimonial -->
    <rect x="0" y="734" width="390" height="60" fill="#2E8B57"/>
    <text x="20" y="758" font-size="11" fill="#FFFFFF" font-style="italic">"Helped me return to football safely."</text>
    <text x="20" y="776" font-size="10" fill="#FFFFFF">— Sample Testimonial</text>

    <!-- Footer -->
    <rect x="0" y="794" width="390" height="50" fill="#163A5F" rx="0"/>
    <text x="20" y="815" font-size="10" fill="#FFFFFF">hello@recoverylab.com</text>
    <text x="20" y="830" font-size="10" fill="#FFFFFF">Homepage · Recovery Plan · Injury Library</text>
  </g>

  <!-- Labels -->
  <text x="620" y="1010" font-size="14" fill="#333333" text-anchor="middle" transform="translate(0,0)"></text>
</svg>
