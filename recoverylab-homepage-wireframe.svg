<svg xmlns="http://www.w3.org/2000/svg" width="1910" height="1024" viewBox="0 0 1910 1024" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="1910" height="1024" fill="#F5F5F5"/>

  <!-- ===================== DESKTOP FRAME ===================== -->
  <text x="0" y="-10" font-size="16" fill="#333333"></text>
  <g>
    <rect x="0" y="0" width="1440" height="1024" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="1440" height="80" fill="#163A5F"/>
    <text x="40" y="47" font-size="22" font-weight="bold" fill="#FFFFFF">RecoveryLab</text>
    <g font-size="14" fill="#FFFFFF">
      <text x="780" y="45">Homepage</text>
      <text x="880" y="45">Recovery Plan</text>
      <text x="1010" y="45">Injury Library</text>
      <text x="1150" y="45">Contact</text>
      <text x="1250" y="45">About</text>
    </g>
    <circle cx="1420" cy="15" r="14" fill="#2E8B57"/>
    <text x="1420" y="20" font-size="12" fill="#FFFFFF" text-anchor="middle">1.1</text>

    <!-- Hero -->
    <rect x="0" y="80" width="1440" height="400" fill="#F5F5F5"/>
    <text x="40" y="230" font-size="40" font-weight="bold" fill="#163A5F">Recover Stronger. Return Safer.</text>
    <text x="40" y="270" font-size="18" fill="#333333">Personalised recovery plans, expert guidance, and injury prevention built around you.</text>
    <rect x="40" y="310" width="230" height="52" rx="8" fill="#F97316"/>
    <text x="155" y="343" font-size="16" fill="#FFFFFF" text-anchor="middle">Start Your Assessment</text>
    <circle cx="1400" cy="120" r="14" fill="#2E8B57"/>
    <text x="1400" y="125" font-size="12" fill="#FFFFFF" text-anchor="middle">1.3</text>

    <!-- Feature cards -->
    <text x="40" y="520" font-size="22" font-weight="bold" fill="#163A5F">How RecoveryLab Helps</text>

    <g>
      <rect x="40" y="550" width="420" height="240" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
      <rect x="72" y="582" width="48" height="48" rx="8" fill="#2E8B57"/>
      <text x="72" y="660" font-size="18" font-weight="bold" fill="#163A5F">Recovery Assessment</text>
      <text x="72" y="690" font-size="13" fill="#333333">Answer a short questionnaire and</text>
      <text x="72" y="710" font-size="13" fill="#333333">get a plan matched to your injury.</text>
    </g>

    <g>
      <rect x="510" y="550" width="420" height="240" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
      <rect x="542" y="582" width="48" height="48" rx="8" fill="#2E8B57"/>
      <text x="542" y="660" font-size="18" font-weight="bold" fill="#163A5F">Injury Library</text>
      <text x="542" y="690" font-size="13" fill="#333333">Understand common injuries before</text>
      <text x="542" y="710" font-size="13" fill="#333333">your first consultation.</text>
    </g>

    <g>
      <rect x="980" y="550" width="420" height="240" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
      <rect x="1012" y="582" width="48" height="48" rx="8" fill="#2E8B57"/>
      <text x="1012" y="660" font-size="18" font-weight="bold" fill="#163A5F">Exercise Library</text>
      <text x="1012" y="690" font-size="13" fill="#333333">Guided mobility and strength moves</text>
      <text x="1012" y="710" font-size="13" fill="#333333">for every stage of recovery.</text>
    </g>

    <circle cx="1400" cy="560" r="14" fill="#2E8B57"/>
    <text x="1400" y="565" font-size="12" fill="#FFFFFF" text-anchor="middle">1.5</text>

    <!-- Testimonial -->
    <rect x="0" y="820" width="1440" height="120" fill="#2E8B57"/>
    <text x="40" y="870" font-size="16" fill="#FFFFFF" font-style="italic">"RecoveryLab helped me get back to football safely after my ACL injury."</text>
    <text x="40" y="900" font-size="14" fill="#FFFFFF">— Sample Testimonial, Footballer</text>

    <!-- Footer -->
    <rect x="0" y="940" width="1440" height="84" fill="#163A5F"/>
    <text x="40" y="975" font-size="13" fill="#FFFFFF">Contact: hello@recoverylab.com</text>
    <text x="40" y="998" font-size="13" fill="#FFFFFF">Homepage · Recovery Plan · Injury Library · Contact · About</text>
